[package]
name = "wrashpty"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"

[dependencies]
# PTY and terminal control
portable-pty = "0.8"
reedline = "0.28"
crossterm = "0.27"

# POSIX syscalls and signal handling
nix = { version = "0.27", features = ["term", "signal", "poll"] }
signal-hook = "0.3"
libc = "0.2"

# Cryptographic session tokens
getrandom = "0.2"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Zero-allocation collections for hot paths
smallvec = "1.15.1"

# Temporary file handling
tempfile = "3.8"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Path resolution
dirs = "5.0"

# Unicode display width
unicode-width = "0.1"

[dev-dependencies]
rexpect = "0.5"
assert_cmd = "2.0"
proptest = "1.4"

[profile.release]
lto = "thin"
opt-level = 3
